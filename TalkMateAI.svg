    </text>
    <text x="870" y="140" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="10" fill="#475569">
      音訊／影像接收
    </text>
    
    <!-- 後端處理流程 -->
    <rect x="780" y="460" width="540" height="40" fill="#f3f4f6" stroke="#6b7280" stroke-width="1" rx="5"/>
    <text x="1050" y="475" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="11" font-weight="bold" fill="#374151">
      後端處理流程
    </text>
    <text x="1050" y="490" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="9" fill="#6b7280">
      音訊 → Whisper → 文字＋影像 → SmolVLM2 → 生成器 → Kokoro TTS → WebSocket 回應
    </text>
    
    <!-- Whisper STT -->
    <rect x="780" y="260" width="160" height="80" fill="#dcfce7" stroke="#16a34a" stroke-width="1" rx="5"/>
    <text x="860" y="280" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="12" font-weight="bold" fill="#16a34a">
      Whisper STT
    </text>
    <text x="860" y="295" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="10" fill="#475569">
      openai/whisper-tiny
    </text>
    <text x="860" y="310" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="10" fill="#475569">
      音訊 → 文字
    </text>
    <text x="860" y="325" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="10" fill="#475569">
