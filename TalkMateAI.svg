    </text>
    
    <!-- SmolVLM2 -->
    <rect x="960" y="260" width="160" height="80" fill="#fce7f3" stroke="#ec4899" stroke-width="1" rx="5"/>
    <text x="1040" y="280" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="12" font-weight="bold" fill="#ec4899">
      SmolVLM2
    </text>
    <text x="1040" y="295" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="10" fill="#475569">
      256M-Video-Instruct
    </text>
    <text x="1040" y="310" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="10" fill="#475569">
