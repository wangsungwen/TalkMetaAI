    </text>
    <text x="1040" y="325" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="10" fill="#475569">
      Flash Attention 2
    </text>
    
    <!-- Generator Streaming -->
    <rect x="1140" y="260" width="160" height="80" fill="#e0e7ff" stroke="#6366f1" stroke-width="1" rx="5"/>
    <text x="1220" y="280" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="12" font-weight="bold" fill="#6366f1">
      文字生成器
    </text>
    <text x="1220" y="295" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="10" fill="#475569">
