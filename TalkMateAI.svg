<svg viewBox="0 0 1400 900" width="2800" height="1800" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">前端與後端系統架構圖</title>
  <desc id="desc">Next.js 前端、FastAPI 與 WebSocket 後端，包含 Whisper、SmolVLM2、Kokoro TTS 等模組的資料流架構。</desc>
  <!-- Background -->
  <rect width="1400" height="900" fill="#f8fafc"/>
  
  <!-- Title -->
  <!-- Removed title for cleaner look -->
  
  <!-- Frontend Section -->
  <g>
    <!-- Frontend Container -->
    <rect x="50" y="50" width="600" height="320" fill="#e0f2fe" stroke="#0369a1" stroke-width="2" rx="10"/>
    <text x="350" y="75" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#0369a1">
      前端（Next.js）
    </text>
    
    <!-- 相機串流 -->
    <rect x="70" y="90" width="140" height="80" fill="#ffffff" stroke="#0369a1" stroke-width="1" rx="5"/>
    <text x="140" y="110" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="12" font-weight="bold" fill="#0369a1">
      相機串流
    </text>
    <text x="140" y="125" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="10" fill="#475569">
      MediaStream API
    </text>
    <text x="140" y="140" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="10" fill="#475569">
      影像擷取
    </text>
    <text x="140" y="155" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="10" fill="#475569">
      320x240 JPEG
    </text>
    
    <!-- 語音活動偵測 -->
    <rect x="230" y="90" width="160" height="80" fill="#ffffff" stroke="#0369a1" stroke-width="1" rx="5"/>
    <text x="310" y="110" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="12" font-weight="bold" fill="#0369a1">
      語音活動偵測
    </text>
    <text x="310" y="125" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="10" fill="#475569">
      能量閾值濾波
    </text>
    <text x="310" y="140" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="10" fill="#475569">
      AudioWorklet 處理
    </text>
    <text x="310" y="155" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="10" fill="#475569">
      16kHz PCM 音訊
    </text>
    
    <!-- TalkingHead 虛擬頭像 -->
    <rect x="410" y="90" width="140" height="80" fill="#ffffff" stroke="#0369a1" stroke-width="1" rx="5"/>
    <text x="480" y="110" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="12" font-weight="bold" fill="#0369a1">
      TalkingHead 虛擬頭像
    </text>
    <text x="480" y="125" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="10" fill="#475569">
      3D 頭像渲染
    </text>
    <text x="480" y="140" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="10" fill="#475569">
      唇形同步＋時序
    </text>
    <text x="480" y="155" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="10" fill="#475569">
      ReadyPlayer.me
    </text>
    
    <!-- WebSocket 管理器 -->
    <rect x="160" y="190" width="280" height="80" fill="#ddd6fe" stroke="#7c3aed" stroke-width="2" rx="5"/>
    <text x="300" y="210" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="12" font-weight="bold" fill="#7c3aed">
      WebSocket 管理器
    </text>
    <text x="300" y="225" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="10" fill="#475569">
