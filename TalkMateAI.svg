    </text>
    
    <!-- Kokoro TTS -->
    <rect x="780" y="360" width="160" height="80" fill="#fed7e2" stroke="#db2777" stroke-width="1" rx="5"/>
    <text x="860" y="380" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="12" font-weight="bold" fill="#db2777">
      Kokoro TTS
    </text>
    <text x="860" y="395" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="10" fill="#475569">
      原生時序</text>
    <text x="860" y="410" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="10" fill="#475569">
      24kHz 音訊
    </text>
    <text x="860" y="425" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="10" fill="#475569">
      詞級同步
    </text>
    
    <!-- 音訊佇列 Manager -->
    <rect x="960" y="360" width="160" height="80" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" rx="5"/>
    <text x="1040" y="380" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="12" font-weight="bold" fill="#f59e0b">
