    </text>
    <text x="300" y="240" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="10" fill="#475569">
      中斷處理
    </text>
    <text x="300" y="255" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="10" fill="#475569">
      Base64 音訊＋原生時序
    </text>
    
    <!-- Processing Logic -->
    <rect x="70" y="290" width="480" height="60" fill="#f3f4f6" stroke="#6b7280" stroke-width="1" rx="5"/>
    <text x="310" y="310" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="11" font-weight="bold" fill="#374151">
      前端處理流程
    </text>
    <text x="310" y="325" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="10" fill="#6b7280">
      Energy Level Check → Audio Buffering → 影像擷取 (if camera active) → WebSocket Send
    </text>
    <text x="310" y="340" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="9" fill="#6b7280">
      接收音訊 → 時序轉換 → 以原生唇形同步播放 TalkingHead
    </text>
  </g>
  
  <!-- Backend Section -->
  <g>
    <!-- Backend Container -->
    <rect x="750" y="50" width="600" height="800" fill="#fef3c7" stroke="#d97706" stroke-width="2" rx="10"/>
    <text x="1050" y="75" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#d97706">
      後端（FastAPI + WebSocket）
    </text>
    
    <!-- WebSocket 伺服器 -->
    <rect x="780" y="90" width="180" height="60" fill="#ffffff" stroke="#d97706" stroke-width="1" rx="5"/>
    <text x="870" y="110" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="12" font-weight="bold" fill="#d97706">
      WebSocket 伺服器
    </text>
    <text x="870" y="125" text-anchor="middle" font-family="Noto Sans CJK TC, Microsoft JhengHei, PingFang TC, Arial, sans-serif" font-size="10" fill="#475569">
